# CrewAI + local HAPI FHIR (seeded from fixtures) + FHIR MCP.
# No UI / Postgres / Autogen.
services:
  hapi-fhir:
    image: hapiproject/hapi:v6.8.0
    container_name: healthcare-hapi
    ports:
      - "8085:8080"
    environment:
      hapi.fhir.server_address: http://hapi-fhir:8080/fhir
      hapi.fhir.validation.enabled: "false"
      JAVA_OPTS: -Xmx1g -Xms512m
    # Image is minimal (no curl/sh) — seed script waits on /fhir/metadata instead.
    restart: unless-stopped

  fhir-mcp-server:
    build:
      context: ..
      dockerfile: fhir_mcp_server/Dockerfile
    image: healthcare-ai/fhir-mcp-server:demo
    pull_policy: never
    container_name: healthcare-fhir-mcp
    ports:
      - "8004:8004"
    environment:
      FHIR_MCP_HOST: "0.0.0.0"
      FHIR_MCP_PORT: "8004"
      FHIR_MCP_FHIR__BASE_URL: http://hapi-fhir:8080/fhir
      FHIR_MCP_FHIR__TIMEOUT: "30"
    depends_on:
      - hapi-fhir
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  fhir-seed:
    image: python:3.11-slim
    container_name: healthcare-fhir-seed
    volumes:
      - ./scripts/seed_fhir.py:/seed_fhir.py:ro
      - ./fixtures/patients.json:/fixtures/patients.json:ro
    environment:
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      FIXTURES_PATH: /fixtures/patients.json
      FHIR_SEED_WAIT_SECONDS: "180"
    depends_on:
      - hapi-fhir
    entrypoint: ["python", "/seed_fhir.py"]
    restart: "no"

  healthcare-crewai:
    build:
      context: ..
      dockerfile: overmind_demo/crewai_service/Dockerfile
    image: healthcare-ai/overmind-crewai:demo
    pull_policy: never
    container_name: healthcare-crewai
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OVERMIND_DEMO_MODEL: ${OVERMIND_DEMO_MODEL:-qwen/qwen3.6-35b-a3b}
      OVERMIND_DEMO_TEMPERATURE: ${OVERMIND_DEMO_TEMPERATURE:-0.2}
      CREWAI_PORT: "8090"
      FHIR_MCP_URL: http://fhir-mcp-server:8004
      PYTHONPATH: /app
    ports:
      - "8090:8090"
    volumes:
      - ./crewai_service:/app
    depends_on:
      fhir-mcp-server:
        condition: service_healthy
      fhir-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 45s

  executioner:
    image: healthcare-ai/overmind-crewai:demo
    pull_policy: never
    container_name: healthcare-executioner
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OVERMIND_API_KEY: ${OVERMIND_API_KEY:-}
      OVERMIND_API_URL: ${OVERMIND_API_URL:-http://host.docker.internal:8000}
      OVERMIND_PROJECT_ID: ${OVERMIND_PROJECT_ID:-}
      OVERMIND_AGENT_ID: ${OVERMIND_AGENT_ID:-}
      OVERMIND_CWD: /workspace
      AGENT_URL: http://healthcare-crewai:8090
      AGENT_CONTAINER: healthcare-crewai
      FHIR_MCP_URL: http://fhir-mcp-server:8004
      GIT_AUTHOR_NAME: overmind
      GIT_AUTHOR_EMAIL: overmind@local
      GIT_COMMITTER_NAME: overmind
      GIT_COMMITTER_EMAIL: overmind@local
      PYTHONPATH: /app
    volumes:
      - ../:/workspace
      - ./:/app/demo
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      healthcare-crewai:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        git config --global user.name "$${GIT_AUTHOR_NAME:-overmind}"
        git config --global user.email "$${GIT_AUTHOR_EMAIL:-overmind@local}"
        git config --global --add safe.directory /workspace
        echo "Executioner ready. Paste the Jobs-tab start command (PyPI), e.g.:"
        echo "  pip install 'overmind>=0.1.53' && \\"
        echo "  OVERMIND_CWD=/workspace OVERMIND_API_URL=\$$OVERMIND_API_URL \\"
        echo "  OVERMIND_API_KEY=... OVERMIND_PROJECT_ID=... overmind optimize"
        exec sleep infinity
    restart: unless-stopped
